{% set name = "odc-dscache" %}
{% set version = "1.9.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 9676cb959263212f7770fd2263ca13dc62837262891c10ab286452106aeee108

build:
  entry_points:
    - slurpy = odc.dscache.apps.slurpy:cli
    - dstiler = odc.dscache.apps.dstiler:cli
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - datacube
    - pandas
    - psycopg2
    - zstandard
    - python-lmdb
    - click
    - toolz

test:
  imports:
    - odc
  commands:
    - pip check
    - slurpy --help
    - dstiler --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/opendatacube/odc-dscache/
  summary: ODC Dataset File Cache
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Ariana-B
